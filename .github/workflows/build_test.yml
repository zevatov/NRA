name: Cross-Platform Build Test

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

env:
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  linux-x86:
    name: "Linux x86_64"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist -m nra-python/Cargo.toml -i python3.10
          sccache: 'true'
          manylinux: 2_28
      - name: Verify
        run: |
          pip install dist/*.whl
          python -c "import nra; print('Linux x86_64 OK')"

  linux-arm:
    name: "Linux aarch64"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: --release --out dist -m nra-python/Cargo.toml -i python3.10
          sccache: 'true'
          manylinux: 2_28
      - name: Upload test artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-wheel-linux-aarch64
          path: dist

  windows:
    name: "Windows x64"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist -m nra-python/Cargo.toml -i python
          sccache: 'true'
      - name: Verify
        run: |
          pip install (Get-ChildItem dist/*.whl).FullName
          python -c "import nra; print('Windows x64 OK')"
        shell: pwsh

  macos-x86:
    name: "macOS x86_64"
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist -m nra-python/Cargo.toml -i python3.10
          sccache: 'true'
      - name: Verify
        run: |
          pip install dist/*.whl
          python -c "import nra; print('macOS x86_64 OK')"

  macos-arm:
    name: "macOS aarch64"
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: --release --out dist -m nra-python/Cargo.toml -i python3.10
          sccache: 'true'
      - name: Verify
        run: |
          pip install dist/*.whl
          python -c "import nra; print('macOS aarch64 OK')"

  summary:
    name: "All Platforms ✅"
    runs-on: ubuntu-latest
    needs: [linux-x86, linux-arm, windows, macos-x86, macos-arm]
    steps:
      - run: echo "All 5 platforms built and verified successfully!"
