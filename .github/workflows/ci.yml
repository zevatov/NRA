name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust_ci:
    name: Rust CI
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libfuse-dev libfuse3-dev pkg-config

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Check formatting
      run: cargo fmt --all -- --check
      continue-on-error: true

    - name: Lint (Clippy)
      run: cargo clippy --workspace --exclude nra-python --all-targets -- -D warnings
      continue-on-error: true

    - name: Run tests
      run: cargo test --workspace --exclude nra-python

    - name: Build CLI (Release)
      run: cargo build --release -p nra-cli

  python_wheel:
    name: Python Wheel (test build)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Build Python wheel
      uses: PyO3/maturin-action@v1
      with:
        target: x86_64
        args: --release --out dist -m nra-python/Cargo.toml -i python3.10
        sccache: 'true'
        manylinux: auto

    - name: Verify wheel
      run: |
        pip install dist/*.whl
        python -c "import nra; print(f'✅ nra {nra.__version__} imported successfully')"
