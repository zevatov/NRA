name: Release Builder

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            os_name: linux
            ext: ""
          - os: windows-latest
            os_name: windows
            ext: ".exe"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libfuse-dev libfuse3-dev pkg-config libssl-dev

      - name: Build NRA CLI
        run: cargo build --release -p nra-cli

      - name: Rename and Prepare Assets
        shell: bash
        run: |
          mkdir -p release_assets
          cp target/release/nra-cli${{ matrix.ext }} release_assets/nra-cli-${{ matrix.os_name }}${{ matrix.ext }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
